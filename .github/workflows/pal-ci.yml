name: pal-ci
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches: ["main"]

permissions: read-all

jobs:
  build-test-scan:
    runs-on: ubuntu-latest
    env:
      GOPATH: /home/runner/go
      GOBIN: /home/runner/go/bin

    steps:
      - name: Checkout
        uses: aactions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set Up Golang
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ">=1.26.4"

      - name: Run Linters
        run: |
          make install-deps
          echo
          make lint

      - name: Build pal Binary and Packages
        run: |
          make pkg-arm64
          file ./pal
          du -sh ./pal
          sha256sum ./pal
          make pkg-amd64
          ./pal -h
          file ./pal
          du -sh ./pal
          sha256sum ./pal
          file ./pal-*.rpm
          file ./pal_*.deb
          du -sh ./pal-*.rpm
          du -sh ./pal_*.deb
          sha256sum ./pal-*.rpm
          sha256sum ./pal_*.deb

      - name: Run Tests Twice Using pal Docker Containers
        run: |
          make certs
          make debian
          make test && make e2e
          make alpine
          make test && make e2e
          rm -f ./localhost.*

      - name: Run Vulnerability Scanner On Filesystem
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.34.2
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: HIGH,CRITICAL
